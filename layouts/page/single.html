{{define "main"}}

<div id="page-content"
  class="flex flex-col overflow-y-auto justify-start min-h-0
         items-center container rounded-2xl w-11/12
         max-h-screen h-4/6 md:h-full opacity-95 border border-black backdrop-blur-md
         shadow-2xl md:w-4/5 xl:w-3/5 md:rounded-3xl font-[Alkia]">

  <div class="p-4 md:p-8 w-full h-full flex flex-col overflow-y-auto">
    <h1 class="text-2xl md:text-3xl font-semibold font-[dotFont] mb-4 text-center">{{.Title}}</h1>
    <div class="text-base md:text-lg leading-relaxed space-y-2">
      {{.Content}}
    </div>
    <div class="mt-10 pt-4 border-t border-gray-300 text-xs md:text-sm text-gray-500 flex flex-col items-end">
      <span>Last updated: {{.Params.lastUpdated}}</span>
      <span>Revision {{.Params.revision}}</span>
    </div>
  </div>

</div>

{{end}}

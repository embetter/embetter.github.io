{{define "main"}}

<div id="page-content" class="flex flex-col justify-between md:flex md:flex-col md:justify-center items-center rounded-2xl w-11/12 opacity-95 border-solid border-opacity-50 border border-black backdrop-blur-md md:opacity-95 md:backdrop-blur-md shadow-2xl md:border-[0.9px] md:w-4/5 xl:w-3/5 md:rounded-3xl md:mt-0 mb-6 font-[Alkia]">

  <div class="p-6 md:p-10 w-full flex flex-col justify-center items-center pt-6 md:pt-0">
    
    {{/* Title Section */}}
    <div class="w-full text-center mb-8 md:mb-10">
      <h1 class="text-2xl md:text-3xl lg:text-4xl font-semibold text-gray-800 tracking-normal">Annual Returns</h1>
      <p class="text-xs md:text-sm text-gray-600 mt-1 font-normal">Download our financial reports for each fiscal year</p>
    </div>

    {{/* Reports Grid */}}
    <div class="w-full flex flex-wrap justify-center gap-3 md:gap-5 lg:gap-6">
      
      {{/* FY 24-25 Report Button */}}
      <a href="/reports/Report-FY-24-25.pdf" download class="group relative w-36 md:w-44 lg:w-48 h-24 md:h-28 border-2 border-blue-500 rounded-lg flex flex-col items-center justify-center hover:border-blue-600 transition-all duration-300 cursor-pointer shadow-md hover:shadow-lg overflow-hidden bg-white/80">
        
        <div class="absolute inset-0 bg-gradient-to-br from-blue-100 via-transparent to-transparent opacity-20 group-hover:opacity-100 transition-opacity duration-300 rounded-lg"></div>
        
        <div class="relative z-10 flex flex-col items-center justify-center h-full px-2">
          <span class="text-xl md:text-2xl lg:text-3xl font-semibold text-blue-500 text-center group-hover:text-blue-600 transition-colors duration-300">FY 24-25</span>
          <span class="text-xs text-gray-600 mt-1 group-hover:text-gray-800 transition-colors duration-300 font-normal">Download</span>
        </div>
        
        <div class="absolute inset-0 border-2 border-blue-400 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-300 animate-pulse"></div>
      </a>

    </div>

  </div>

</div>

{{end}}

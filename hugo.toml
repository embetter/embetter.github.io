[params.serviceDescription]
descriptionDevelopment = "We build web and mobile applications that solve real business problems. From responsive React dashboards to cross-platform mobile apps with React Native, our development team delivers clean, maintainable code. We follow kanban workflows, CI/CD pipelines, and thorough QA so your product ships fast and stays reliable as it scales."

descriptionDesign = "Good design is the difference between a product users tolerate and one they love. We create wireframes, interactive prototypes, and polished UI that align with your brand and your users' mental models. Every screen we design is tested for clarity, accessibility, and flow—so your users accomplish what they came to do."

descriptionData = "Your business generates data every second. We help you capture, clean, and move it to where it matters. Our DataOps practice builds automated pipelines—from ingestion to warehousing to dashboarding—so your team makes decisions on fresh, trustworthy data. Whether it's real-time streams or batch ETL, we design for reliability and observability."

descriptionEmbedded = "We write the firmware that runs on your hardware. From bare-metal C on microcontrollers to RTOS-based systems (Zephyr, FreeRTOS), our embedded engineers handle bootloaders, OTA firmware updates, driver integration, communication protocols (SPI, I2C, UART, CAN), and power optimisation. We test on real hardware in the loop so your device behaves reliably in production."

descriptionIot = "We connect the physical world to the cloud. Our IoT practice covers BLE (Bluetooth Low Energy) for proximity-aware applications and LoRaWAN for long-range, low-power sensor networks. We handle the full stack—firmware on the endpoint, gateway configuration, cloud ingestion, and the dashboard that monitors it all. Field-tested for industrial and networked deployments."

descriptionWeb3 = "We build on Solana using Rust for high-performance on-chain programs. Our work covers DePIN (Decentralised Physical Infrastructure Networks), custom Solana programs, and integrations with networks like Helium for decentralised wireless infrastructure. Every program we write is tested rigorously and audited before mainnet deployment. We also build the off-chain services and front-end interfaces that complete the stack."

descriptionDevOps = "We set up the infrastructure and automation your team needs to ship reliably. From AWS architecture to Pulumi and OpenTofu for infrastructure as code, and GitHub Actions or GitLab CI pipelines—we build it so your deployments are repeatable, monitored, and recoverable. We also consult on incident response, cost optimisation, and security hardening."
